<text x="50" y="748" fill="#64748b" font-size="8">DC = Direct Current · AC = Alternating Current · LV = Low Voltage (&lt;1kV) · MV = Medium Voltage (1-50kV) · HV = High Voltage (&gt;50kV) · PV = Photovoltaic</text>
<text x="50" y="762" fill="#64748b" font-size="8">BESS = Battery Energy Storage System · SCADA = Supervisory Control And Data Acquisition · EMS = Energy Management System · LFP = Lithium Iron Phosphate</text>
