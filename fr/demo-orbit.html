    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Data Atlas — Démo Orbit Menu</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ─── Canvas container ─── */
        #orbit-container {
            width: 100%;
            max-width: 1100px;
            height: 70vh;
            min-height: 400px;
            max-height: 650px;
            position: relative;
        }
        #orbit-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ─── Fallback message (shown if WebGL fails) ─── */
        #webgl-fallback {
            display: none;
            text-align: center;
            padding: 4rem 2rem;
            color: #94a3b8;
        }

        /* ─── Title ─── */
        .site-title {
            text-align: center;
            padding: 2rem 1rem 0;
        }
        .site-title h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .site-title p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        /* ─── Text menu (fallback + SEO) ─── */
        .text-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem 1.5rem;
            padding: 1.5rem 1rem;
            max-width: 700px;
        }
        .text-menu a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            transition: color 0.2s, background 0.2s;
        }
        .text-menu a:hover, .text-menu a:focus {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }

        /* ─── Language switch ─── */
        .lang-switch {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.25rem;
            z-index: 20;
        }
        .lang-switch a, .lang-switch span {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            border-radius: 0.25rem;
            text-decoration: none;
            border: 1px solid #334155;
        }
        .lang-switch a {
            color: #94a3b8;
            transition: color 0.2s;
        }
        .lang-switch a:hover { color: #f8fafc; }
        .lang-switch span {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            font-weight: 600;
            border-color: rgba(245, 158, 11, 0.3);
        }

        /* ─── Mini footer ─── */
        .mini-footer {
            padding: 2rem 1rem;
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
            margin-top: auto;
        }
        .mini-footer a {
            color: #64748b;
            text-decoration: none;
        }
        .mini-footer a:hover { color: #f59e0b; }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            #orbit-container {
                height: 50vh;
                min-height: 300px;
            }
            .site-title h1 { font-size: 1.4rem; }
            .text-menu { gap: 0.25rem 1rem; }
            .text-menu a { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
        }
    </style>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/site.css">
<meta name="description" content="Interactive 3D orbital visualization of solar energy dynamics and system performance metrics.">
</head>
<body class="sm-compact">

    <!-- Language switch -->
    <div class="lang-switch">
        <a href="../en/index.html">EN</a>
        <span>FR</span>
    </div>

    <!-- Title -->
    <div class="site-title">
        <h1>Solar Data Atlas</h1>
        <p>Finance solaire · Données · Outils</p>
    </div>

    <!-- 3D Canvas -->
    <div id="orbit-container" aria-hidden="true"></div>

    <!-- Fallback if WebGL fails -->
    <div id="webgl-fallback">
        <p>Votre navigateur ne supporte pas WebGL.</p>
        <p>Utilisez le menu ci-dessous pour naviguer.</p>
    </div>

    <!-- Text menu (always visible — SEO + accessibility) -->
    <nav class="text-menu" aria-label="Navigation principale">
        <a href="/fr/technologies.html">Technologies</a>
        <a href="/fr/economie.html">Économie</a>
        <a href="/fr/marches.html">Marchés</a>
        <a href="/fr/outils.html">Outils</a>
        <a href="/fr/analyses/">Analyses</a>
        <a href="/fr/hypotheses.html">Données</a>
    </nav>

    <!-- Mini footer -->
    <footer class="mini-footer">
        <a href="/fr/recrutez-moi.html">Bernard Pugnet</a> · Solar Data Atlas 2026
    </footer>

    <!-- Three.js module -->
    <script type="module">
        import { init } from '../js/home-orbit.js';

        const success = init('orbit-container');
        if (!success) {
            document.getElementById('orbit-container').style.display = 'none';
            document.getElementById('webgl-fallback').style.display = 'block';
        }
    </script>

<script src="../js/nav-active.js" defer></script>

</html>
