    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Simulateur - Solar Data Atlas Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .widget {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .header h3 {
            color: #f97316;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .header p {
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .form-group {
            margin-bottom: 0.875rem;
        }
        .form-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        .form-value {
            color: #f97316;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 3px;
            outline: none;
            accent-color: #f97316;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #f97316;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #fb923c;
            transform: scale(1.1);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #f97316;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        input[type="range"]::-moz-range-thumb:hover {
            background: #fb923c;
            transform: scale(1.1);
        }
        select {
            width: 100%;
            padding: 0.5rem;
            background: #0f172a;
            color: #cbd5e1;
            border: 1px solid #334155;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        select:hover {
            border-color: #475569;
        }
        select:focus {
            outline: none;
            border-color: #f97316;
        }
        select option {
            background: #1e293b;
            color: #cbd5e1;
        }
        .result-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.875rem;
            margin-top: 1rem;
            text-align: center;
        }
        .result-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.375rem;
        }
        .result-value {
            color: #f97316;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.375rem;
            font-variant-numeric: tabular-nums;
        }
        .result-detail {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .footer {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }
        .footer a {
            color: #f97316;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: #fb923c;
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="header">
            <h3>Mini Simulateur</h3>
            <p>Calculez votre économie solaire</p>
        </div>

        <form id="simulatorForm" onchange="calculate()">
            <!-- Puissance -->
            <div class="form-group">
                <div class="form-label">
                    <span>Puissance (kWc)</span>
                    <span class="form-value" id="puissanceValue">6</span>
                </div>
                <input type="range" id="puissance" name="puissance" min="3" max="9" value="6" step="0.5">
            </div>

            <!-- Zone -->
            <div class="form-group">
                <div class="form-label">Zone climatique</div>
                <select id="zone" name="zone">
                    <option value="nord">Nord (900 kWh/kWc/an)</option>
                    <option value="centre" selected>Centre (1100 kWh/kWc/an)</option>
                    <option value="sud">Sud (1350 kWh/kWc/an)</option>
                </select>
            </div>

            <!-- Consommation -->
            <div class="form-group">
                <div class="form-label">
                    <span>Consommation (kWh/an)</span>
                    <span class="form-value" id="consommationValue">4500</span>
                </div>
                <input type="range" id="consommation" name="consommation" min="3000" max="8000" value="4500" step="500">
            </div>
        </form>

        <div class="result-box">
            <div class="result-label">Économie estimée</div>
            <div class="result-value" id="economieResult">800 €</div>
            <div class="result-detail">Payback: <span id="paybackResult">5.2</span> ans</div>
        </div>

        <div class="footer">
            <a href="https://www.solardataatlas.com/fr" target="_blank">▸ Solar Data Atlas</a>
        </div>
    </div>

    <script>
        // Tarifs 2026
        const TARIF_ELEC = 0.2516; // €/kWh
        const COUT_INSTALLATION = 2000; // €/kWc résidentiel clé en main (borne haute marché FR, 2026-Q1)

        // Productivité par zone
        const productivity = {
            nord: 900,    // kWh/kWc/an
            centre: 1100, // kWh/kWc/an
            sud: 1350     // kWh/kWc/an
        };

        const puissanceInput = document.getElementById('puissance');
        const consommationInput = document.getElementById('consommation');
        const zoneSelect = document.getElementById('zone');

        puissanceInput.addEventListener('input', function() {
            document.getElementById('puissanceValue').textContent = this.value;
        });

        consommationInput.addEventListener('input', function() {
            document.getElementById('consommationValue').textContent = this.value;
        });

        function calculate() {
            const puissance = parseFloat(puissanceInput.value); // kWc
            const zone = zoneSelect.value;
            const consommation = parseFloat(consommationInput.value); // kWh/an

            // Production annuelle
            const production = puissance * productivity[zone]; // kWh/an

            // Quantité autoconsommée (simplification: 70% au départ, peut varier)
            const autoconsommation = Math.min(production * 0.7, consommation);

            // Économie annuelle = quantité autoconsommée * tarif électricité
            const economieAnnuelle = autoconsommation * TARIF_ELEC;

            // Coût installation
            const coutInstallation = puissance * COUT_INSTALLATION;

            // Payback (années)
            const payback = coutInstallation / economieAnnuelle;

            // Update results
            document.getElementById('economieResult').textContent =
                Math.round(economieAnnuelle).toLocaleString('fr-FR') + ' €';
            document.getElementById('paybackResult').textContent =
                payback.toFixed(1);
        }

        // Initial calculation
        calculate();
    </script>
</body>
</html>
