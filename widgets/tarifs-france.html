<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarifs France - Solar Data Atlas Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .widget {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .header h3 {
            color: #10b981;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .header p {
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .tarif-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tarif-label {
            font-size: 0.825rem;
            color: #cbd5e1;
            font-weight: 500;
        }
        .tarif-value {
            font-size: 1.125rem;
            font-weight: 700;
            color: #10b981;
            font-variant-numeric: tabular-nums;
        }
        .tarif-unit {
            font-size: 0.625rem;
            color: #94a3b8;
            margin-left: 0.25rem;
        }
        .update-date {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin: 1rem 0;
            padding: 0.5rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.375rem;
        }
        .footer {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }
        .footer a {
            color: #10b981;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: #34d399;
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="header">
            <h3>Tarifs France 2026</h3>
            <p>Données actualisées T1 2026</p>
        </div>

        <div class="tarif-item">
            <span class="tarif-label">Prix Électricité</span>
            <span class="tarif-value">0.2516<span class="tarif-unit">€/kWh</span></span>
        </div>

        <div class="tarif-item">
            <span class="tarif-label">Tarif OA surplus (&lt;9 kWc)</span>
            <span class="tarif-value">0.04<span class="tarif-unit">€/kWh</span></span>
        </div>

        <div class="tarif-item">
            <span class="tarif-label">Prime Autoconso</span>
            <span class="tarif-value">80<span class="tarif-unit">€/kWc</span></span>
        </div>

        <div class="update-date">
            ✓ Mis à jour T1 2026
        </div>

        <div class="footer">
            <a href="https://www.solardataatlas.com/fr" target="_blank">▸ Solar Data Atlas</a>
        </div>
    </div>
</body>
</html>
