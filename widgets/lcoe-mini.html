<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini LCOE - SolarMetrics Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .widget {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .header h3 {
            color: #f59e0b;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .header p {
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .lcoe-value {
            text-align: center;
            margin: 1rem 0;
            padding: 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
        }
        .value {
            color: #f59e0b;
            font-size: 1.75rem;
            font-weight: 700;
        }
        .unit {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .comparison {
            font-size: 0.75rem;
            color: #cbd5e1;
            margin-top: 0.75rem;
        }
        .bar-chart {
            margin: 1rem 0;
        }
        .bar-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .bar-label {
            width: 50px;
            color: #cbd5e1;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .bar-container {
            flex: 1;
            height: 20px;
            background: #0f172a;
            border-radius: 0.25rem;
            overflow: hidden;
            margin: 0 0.5rem;
        }
        .bar-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.625rem;
            font-weight: 600;
            transition: width 0.3s ease;
        }
        .solar { background: linear-gradient(90deg, #10b981, #34d399); }
        .gas { background: linear-gradient(90deg, #ef4444, #f87171); }
        .nuclear { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .bar-value {
            width: 35px;
            text-align: right;
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .footer {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }
        .footer a {
            color: #f59e0b;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="header">
            <h3>LCOE Temps Réel</h3>
            <p>Coût actualisé de l'électricité (EU 2026)</p>
        </div>

        <div class="lcoe-value">
            <div class="value"><span id="lcoeValue">48</span></div>
            <div class="unit">€/MWh</div>
            <div class="comparison">Range: 40-55 €/MWh</div>
        </div>

        <div class="bar-chart">
            <div class="bar-item">
                <div class="bar-label">Solaire</div>
                <div class="bar-container">
                    <div class="bar-fill solar" style="width: 85%;">48</div>
                </div>
                <div class="bar-value">48</div>
            </div>
            <div class="bar-item">
                <div class="bar-label">Gaz</div>
                <div class="bar-container">
                    <div class="bar-fill gas" style="width: 110%;">65</div>
                </div>
                <div class="bar-value">65</div>
            </div>
            <div class="bar-item">
                <div class="bar-label">Nucléaire</div>
                <div class="bar-container">
                    <div class="bar-fill nuclear" style="width: 95%;">56</div>
                </div>
                <div class="bar-value">56</div>
            </div>
        </div>

        <div class="footer">
            <a href="https://www.solardataatlas.com/fr" target="_blank">▸ SolarMetrics</a>
        </div>
    </div>

    <script>
        // Simulate slightly changing LCOE value
        function updateLCOE() {
            const baseValue = 48;
            const variation = Math.sin(Date.now() / 5000) * 3;
            const value = Math.round(baseValue + variation);
            document.getElementById('lcoeValue').textContent = value;
        }

        updateLCOE();
        setInterval(updateLCOE, 1000);
    </script>
</body>
</html>
